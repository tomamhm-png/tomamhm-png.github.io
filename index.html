<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@tomamhm</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:25px;
}

.box{
    width:100%;
    max-width:420px;
    text-align:center;
}

.avatar img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #00F5FF;
    box-shadow:0 0 35px #00F5FF;
    margin-bottom:20px;
}

.name{
    font-size:62px;
    font-weight:900;
    margin-bottom:30px;
}

.card{
    display:block;
    text-decoration:none;
    color:white;
    border-radius:24px;
    padding:26px;
    margin-bottom:20px;
    transition:.25s;
    box-shadow:0 10px 25px rgba(0,0,0,.45);
}

.card:hover{
    transform:translateY(-5px);
}

.title{
    font-size:34px;
    font-weight:800;
}

.sub{
    font-size:22px;
    opacity:.9;
    margin-top:8px;
}

.kaspi{
    background:#E51B23;
    position:relative;
    overflow:hidden;
}

.kaspi::after{
    content:"";
    position:absolute;
    top:-50%;
    left:-70%;
    width:40%;
    height:220%;
    background:rgba(255,255,255,.35);
    transform:rotate(25deg);
    animation:shine 2.8s infinite;
}

@keyframes shine{
    0%{
        left:-70%;
    }
    100%{
        left:170%;
    }
}

.telegram{
    background:#4BA9E9;
}

.tiktok{
    background:#0b0b0b;
    border:1px solid #222;
}

.instagram{
    background:linear-gradient(45deg,#833AB4,#FD1D1D,#FCAF45);
}

.ok{
    display:none;
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    color:#888;
}
</style>

</head>

<body>

<div class="box">

<div class="avatar">
<img src="avatar.png" alt="Tomiris">
</div>

<div class="name">@tomamhm</div>

<div class="card kaspi" onclick="copyKaspi()">

<div class="title">
4400 4303 5833 4214
</div>

<div class="sub">
Kaspi — нажми, чтобы скопировать
</div>

<div class="ok" id="ok">
✅ Скопировано
</div>

</div>

<a class="card telegram" href="https://t.me/mhmtoma">

<div class="title">
Telegram
</div>

<div class="sub">
@mhmtoma
</div>

</a>

<a class="card tiktok" href="https://www.tiktok.com/@tomamhm">

<div class="title">
TikTok
</div>

<div class="sub">
@tomamhm
</div>

</a>

<a class="card instagram" href="https://instagram.com/toma_mhm">

<div class="title">
Instagram
</div>

<div class="sub">
@toma_mhm
</div>

</a>

<div class="footer">
Made with ❤️
</div>

</div>

<script>
function copyKaspi(){
navigator.clipboard.writeText("4400430358334214");
document.getElementById("ok").style.display="block";
setTimeout(()=>{
document.getElementById("ok").style.display="none";
},2000);
}
</script>

</body>
</html>
